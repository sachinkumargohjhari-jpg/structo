<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Structo Cinematic Showcase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-glow: rgba(255, 215, 0, 0.4);
            --gold-primary: #FFD700;
            --blue-glow: rgba(0, 191, 255, 0.3);
            --bg-color: #0b0c10;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(20, 30, 48, 0.5) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(36, 17, 3, 0.4) 0px, transparent 50%),
                linear-gradient(135deg, #0f1016 0%, #050608 100%);
            color: #f5f5f7;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 2rem;
        }

        /* Ambient background lighting */
        .ambient-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.05) 0%, rgba(0, 191, 255, 0.02) 50%, transparent 100%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
            filter: blur(80px);
        }

        /* Main Container */
        .showcase-container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            max-width: 1200px;
            width: 100%;
        }

        .header-section {
            text-align: center;
            animation: fadeInDown 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .header-section h1 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            font-size: 2.5rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #ffffff 30%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.15);
        }

        .header-section p {
            font-size: 1rem;
            color: #86868b;
            letter-spacing: 1px;
            font-weight: 300;
        }

        /* Smartphone Frame styling */
        .phone-wrapper {
            position: relative;
            width: 380px;
            height: 760px;
            background: #1c1d24;
            border-radius: 48px;
            padding: 12px;
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.7),
                0 0 0 4px #2a2c35,
                0 0 0 1px #484b58,
                inset 0 0 20px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.5s ease;
            cursor: pointer;
            animation: floatPhone 6s ease-in-out infinite;
        }

        .phone-wrapper:hover {
            transform: scale(1.02) rotateY(3deg) rotateX(3deg);
            box-shadow: 
                0 35px 60px -10px rgba(0, 0, 0, 0.8),
                0 0 30px rgba(255, 215, 0, 0.15),
                0 0 0 4px #2a2c35,
                0 0 0 1px #ffd700;
        }

        .phone-screen {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 38px;
            overflow: hidden;
            background: #000;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }

        /* Rendering base image */
        .base-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.95;
            transition: transform 0.5s ease;
        }

        /* Swirling particles Canvas overlay */
        .particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
            mix-blend-mode: screen;
        }

        /* Sweeping light beam layer */
        .light-sweep-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
            pointer-events: none;
            overflow: hidden;
        }

        .light-sweep-beam {
            position: absolute;
            top: -20%;
            left: -150%;
            width: 60%;
            height: 140%;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(255, 215, 0, 0.03) 20%,
                rgba(255, 215, 0, 0.18) 40%,
                rgba(255, 255, 255, 0.35) 50%,
                rgba(255, 215, 0, 0.18) 60%,
                rgba(255, 215, 0, 0.03) 80%,
                transparent 100%
            );
            transform: rotate(25deg);
            mix-blend-mode: color-dodge;
            animation: sweepAnimation 4.5s cubic-bezier(0.25, 1, 0.5, 1) infinite;
        }

        /* Interactive controls panel */
        .controls-panel {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1rem;
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 1rem 2rem;
            border-radius: 100px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .btn {
            background: linear-gradient(135deg, #ffd700 0%, #cca300 100%);
            color: #0b0c10;
            border: none;
            padding: 0.8rem 1.8rem;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.5);
            background: linear-gradient(135deg, #ffe033 0%, #e6b800 100%);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.08);
            color: #f5f5f7;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 15px rgba(255,255,255,0.05);
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.85rem;
            color: #86868b;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .slider-group input[type="range"] {
            -webkit-appearance: none;
            width: 100px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }

        .slider-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ffd700;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            transition: transform 0.1s;
        }

        .slider-group input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.25);
        }

        /* Animations */
        @keyframes floatPhone {
            0%, 100% {
                transform: translateY(0px) rotateY(0deg);
            }
            50% {
                transform: translateY(-12px) rotateY(1.5deg);
            }
        }

        @keyframes sweepAnimation {
            0% {
                left: -150%;
            }
            30%, 100% {
                left: 150%;
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Floating action to return to app */
        .back-to-app-btn {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="ambient-glow"></div>

    <a href="index.html" class="btn btn-secondary back-to-app-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to App
    </a>

    <div class="showcase-container">
        <div class="header-section">
            <h1>Structo</h1>
            <p>Cinematic App Icon & Interactive Animation Showcase</p>
        </div>

        <div class="phone-wrapper" id="phoneCard">
            <div class="phone-screen">
                <!-- Base generated rendering -->
                <img src="./assets/structo_cinematic_logo.png" class="base-image" alt="Structo Cinematic Logo" id="logoImage">

                <!-- Particle canvas overlay -->
                <canvas class="particle-canvas" id="particleCanvas"></canvas>

                <!-- Light sweep container -->
                <div class="light-sweep-container">
                    <div class="light-sweep-beam" id="lightBeam"></div>
                </div>
            </div>
        </div>

        <div class="controls-panel">
            <button class="btn" id="triggerSweepBtn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
                Trigger Light Sweep
            </button>

            <div class="slider-group">
                <span>Particles</span>
                <input type="range" id="particleCountSlider" min="20" max="250" value="120">
            </div>

            <div class="slider-group">
                <span>Speed</span>
                <input type="range" id="beamSpeedSlider" min="1" max="5" value="3" step="0.5">
            </div>
        </div>
    </div>

    <script>
        // Particle System Configuration
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        let numParticles = 120;
        let animationFrameId;

        // Resize canvas to match screen coordinates
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
        }

        class Particle {
            constructor(w, h) {
                this.canvasWidth = w;
                this.canvasHeight = h;
                this.reset();
            }

            reset() {
                // Spawn particles around the center (where the main sculpture is)
                const angle = Math.random() * Math.PI * 2;
                const distance = 40 + Math.random() * 120;
                
                this.x = this.canvasWidth / 2 + Math.cos(angle) * distance;
                this.y = this.canvasHeight / 2 - 40 + Math.sin(angle) * distance; // offset upwards slightly to align with sculpture
                
                this.radius = 0.5 + Math.random() * 2;
                this.color = Math.random() > 0.3 ? '#ffd700' : '#87ceeb'; // Gold & Cerulean particles
                
                // Orbit parameters
                this.angle = angle;
                this.speed = (0.005 + Math.random() * 0.012) * (Math.random() > 0.5 ? 1 : -1);
                this.radialSpeed = -0.15 - Math.random() * 0.25; // float inward
                this.distance = distance;
                
                this.opacity = 0.1 + Math.random() * 0.75;
                this.fadeSpeed = 0.002 + Math.random() * 0.005;
                this.sinOffset = Math.random() * Math.PI * 2;
            }

            update() {
                this.angle += this.speed;
                this.distance += this.radialSpeed;
                
                // Update coordinate based on orbit + spiral inward
                this.x = this.canvasWidth / 2 + Math.cos(this.angle) * this.distance;
                this.y = this.canvasHeight / 2 - 40 + Math.sin(this.angle) * this.distance;
                
                // Add a small sine wave vertical wobble
                this.y += Math.sin(this.angle * 4 + this.sinOffset) * 0.3;
                
                // Fade out as they get close to center or randomly
                this.opacity -= this.fadeSpeed;

                if (this.opacity <= 0 || this.distance <= 10) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                
                // Glow effect for larger particles
                if (this.radius > 1.2) {
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = this.color;
                }
                
                ctx.fill();
                ctx.restore();
            }
        }

        function initParticles() {
            particles = [];
            const rect = canvas.getBoundingClientRect();
            for (let i = 0; i < numParticles; i++) {
                particles.push(new Particle(rect.width, rect.height));
            }
        }

        function animate() {
            const rect = canvas.getBoundingClientRect();
            ctx.clearRect(0, 0, rect.width, rect.height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            animationFrameId = requestAnimationFrame(animate);
        }

        // Initialize elements
        window.addEventListener('load', () => {
            resizeCanvas();
            initParticles();
            animate();
        });

        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });

        // Trigger light sweep manually
        const triggerSweepBtn = document.getElementById('triggerSweepBtn');
        const lightBeam = document.getElementById('lightBeam');

        triggerSweepBtn.addEventListener('click', () => {
            // Remove animation and force reflow to restart it
            lightBeam.style.animation = 'none';
            void lightBeam.offsetWidth; // force reflow
            
            const speed = 6.5 - parseFloat(beamSpeedSlider.value);
            lightBeam.style.animation = `sweepAnimation ${speed}s cubic-bezier(0.25, 1, 0.5, 1) infinite`;
        });

        // Speed slider control
        const beamSpeedSlider = document.getElementById('beamSpeedSlider');
        beamSpeedSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            // Translate slider value 1..5 to duration 5.5..1.5s
            const duration = 6.5 - val;
            lightBeam.style.animationDuration = `${duration}s`;
        });

        // Particle count control
        const particleCountSlider = document.getElementById('particleCountSlider');
        particleCountSlider.addEventListener('input', (e) => {
            numParticles = parseInt(e.target.value);
            initParticles();
        });

        // Interactive 3D tilt effect on hover / touch
        const phoneCard = document.getElementById('phoneCard');
        phoneCard.addEventListener('mousemove', (e) => {
            const rect = phoneCard.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            const midX = rect.width / 2;
            const midY = rect.height / 2;
            
            const rotateX = ((y - midY) / midY) * -8; // max 8 degrees
            const rotateY = ((x - midX) / midX) * 8;
            
            phoneCard.style.transform = `scale(1.02) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            
            // Adjust ambient glow slightly based on position
            const ambient = document.querySelector('.ambient-glow');
            ambient.style.transform = `translate(-50%, -50%) translate(${(x - midX) * 0.1}px, ${(y - midY) * 0.1}px)`;
        });

        phoneCard.addEventListener('mouseleave', () => {
            phoneCard.style.transform = 'scale(1) rotateX(0deg) rotateY(0deg)';
            const ambient = document.querySelector('.ambient-glow');
            ambient.style.transform = 'translate(-50%, -50%)';
        });
    </script>
</body>
</html>
