<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Rounded dark background matching the matte charcoal UI theme (#121212) -->
  <rect width="512" height="512" rx="112" fill="#121212"/>
  
  <!-- Subtle accent border in construction yellow (#FFD700) -->
  <rect x="24" y="24" width="464" height="464" rx="88" fill="none" stroke="#FFD700" stroke-width="12" stroke-opacity="0.35"/>
  
  <!-- Grid overlay lines mimicking architectural plans / blueprint look -->
  <line x1="80" y1="24" x2="80" y2="488" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>
  <line x1="160" y1="24" x2="160" y2="488" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>
  <line x1="240" y1="24" x2="240" y2="488" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>
  <line x1="320" y1="24" x2="320" y2="488" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>
  <line x1="400" y1="24" x2="400" y2="488" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>
  
  <line x1="24" y1="80" x2="488" y2="80" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>
  <line x1="24" y1="160" x2="488" y2="160" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>
  <line x1="24" y1="240" x2="488" y2="240" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>
  <line x1="24" y1="320" x2="488" y2="320" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>
  <line x1="24" y1="400" x2="488" y2="400" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>

  <!-- Logo container backdrop -->
  <rect x="136" y="136" width="240" height="240" rx="40" fill="rgba(255, 215, 0, 0.08)" stroke="#FFD700" stroke-width="4" stroke-dasharray="8 6"/>

  <!-- Glowing Yellow Construction House Logo -->
  <g transform="translate(166, 166) scale(7.5)" stroke="#FFD700" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke-shadow="0 0 10px rgba(255,215,0,0.5)"/>
    <polyline points="9 22 9 12 15 12 15 22"/>
  </g>
  
  <!-- Text label "S" in secondary neon orange accent (#FF5722) -->
  <text x="256" y="440" font-family="'Montserrat', sans-serif" font-weight="900" font-size="36" fill="#FF5722" text-anchor="middle" letter-spacing="4">STRUCTO</text>
</svg>
